services:
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:edge
    container_name: mailserver
    hostname: mail
    domainname: vavilov.tj
    ports:
      - "25:25"       # SMTP
      - "143:143"     # IMAP
      - "993:993"     # IMAPS
      - "587:587"     # SMTP Submission
    volumes:
      # Папку с письмами оставляем локальной, чтобы вы могли их читать в VS Code
      - ./mail-data/:/var/mail/
      # Служебные папки состояния и настроек переносим в именованные тома Docker (решает ошибку прав Windows)
      - mail-state:/var/mail-state/
      - mail-config:/tmp/docker-mailserver/
      - /etc/localtime:/etc/localtime:ro
    environment:
      - ENABLE_SPAMASSASSIN=0
      - ENABLE_CLAMAV=0
      - ENABLE_FAIL2BAN=1
      - ONE_DIR=1
      - OVERRIDE_HOSTNAME=mail.vavilov.tj
    restart: always

  webmail:
    image: roundcube/roundcubemail:latest
    container_name: roundcube
    restart: always
    ports:
      - "8080:80"     # http://localhost:8080
    environment:
      - ROUNDCUBEMAIL_DEFAULT_HOST=mailserver
      - ROUNDCUBEMAIL_SMTP_SERVER=mailserver
    depends_on:
      - mailserver

# Объявляем изолированные тома для стабильной работы под Windows
volumes:
  mail-state:
  mail-config:
