version: '3.8'

services:
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:edge
    container_name: mailserver
    hostname: mail
    domainname: vavilov.tj
    ports:
      - "25:25"       # SMTP для обмена письмами между серверами
      - "143:143"     # IMAP без шифрования (для внутренней сети)
      - "993:993"     # IMAPS с TLS шифрованием (безопасный доступ к почте)
      - "587:587"     # SMTP Submission (для отправки писем клиентами)
    volumes:
      - ./mail-data/:/var/mail/
      - ./mail-state/:/var/mail-state/
      - ./mail-config/:/tmp/docker-mailserver/
      - /etc/localtime:/etc/localtime:ro
    environment:
      - ENABLE_SPAMASSASSIN=0
      - ENABLE_CLAMAV=0
      - ENABLE_FAIL2BAN=1
      - ONE_DIR=1
      - OVERRIDE_HOSTNAME=mail.vavilov.tj
    restart: always
